on:
    push:
        tags:
            - "*"
name: Deploy Extension
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v7

            -   uses: actions/setup-node@v6
                with:
                    node-version: 24

            -   run: npm install

            -   name: Publish to Open VSX Registry
                uses: HaaLeo/publish-vscode-extension@v2
                id: publishToOpenVSX
                with:
                    pat: ${{ secrets.OPEN_VSX_TOKEN }}
